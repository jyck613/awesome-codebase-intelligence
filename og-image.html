<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: #e6edf3;
    background:
      radial-gradient(1000px 520px at 82% -12%, rgba(163,113,247,0.28), transparent 60%),
      radial-gradient(900px 460px at -5% 0%, rgba(110,168,255,0.24), transparent 55%),
      #0d1117;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 88px 96px;
    position: relative;
    overflow: hidden;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 12px;
    font-size: 26px; font-weight: 600; letter-spacing: .2px;
    color: #c8d3e0; background: rgba(255,255,255,.05);
    border: 1px solid #30363d; border-radius: 999px;
    padding: 12px 22px; width: max-content;
  }
  .badge svg { fill: #c8d3e0; }
  h1 {
    font-size: 92px; line-height: 1.02; font-weight: 800;
    margin: 34px 0 0; letter-spacing: -1.5px;
    background: linear-gradient(120deg, #ffffff, #a371f7 55%, #6ea8ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  p.sub {
    font-size: 34px; line-height: 1.4; color: #9da7b3;
    margin: 30px 0 0; max-width: 940px;
  }
  .chips { display: flex; gap: 16px; margin-top: 44px; }
  .chip {
    font-size: 24px; font-weight: 600; color: #cdd6e0;
    background: rgba(255,255,255,.05); border: 1px solid #30363d;
    border-radius: 12px; padding: 12px 20px;
  }
  .chip.accent { color: #d7c4ff; border-color: #a371f755; background: rgba(163,113,247,.12); }
</style>
</head>
<body>
  <div class="badge">
    <svg viewBox="0 0 16 16" width="26" height="26" aria-hidden="true"><path d="M8 0a8 8 0 0 0-2.53 15.59c.4.07.55-.17.55-.38v-1.34c-2.23.49-2.7-1.07-2.7-1.07-.36-.92-.89-1.17-.89-1.17-.73-.5.06-.49.06-.49.8.06 1.23.83 1.23.83.71 1.22 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.83-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.22 2.2.82a7.6 7.6 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.52.56.83 1.28.83 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48v2.2c0 .21.15.46.55.38A8 8 0 0 0 8 0Z"/></svg>
    Curated Awesome List
  </div>
  <h1>Awesome Codebase<br />Intelligence Tools</h1>
  <p class="sub">60+ GitHub tools, MCP servers &amp; knowledge-graph engines that help AI agents and developers understand any codebase and onboard faster.</p>
  <div class="chips">
    <span class="chip accent">★ Live GitHub stars</span>
    <span class="chip">MCP servers</span>
    <span class="chip">Code intelligence</span>
    <span class="chip">Onboarding</span>
  </div>
</body>
</html>
